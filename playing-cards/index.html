<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="playing-cards">
      <!-- Ace -->
      <div class="card black-card">
        <div class="left">
          <p>A</p>
          <p>♠</p>
        </div>
        <div class="middle ace">
          <p>♠</p>
        </div>
        <div class="right upside-down">
          <p>A</p>
          <p>♠</p>
        </div>
      </div>

      <!-- Two -->
      <div class="card red-card">
        <div class="left">
          <p>2</p>
          <p>♦</p>
        </div>
        <div class="middle two">
          <p>♦</p>
          <p>♦</p>
        </div>
        <div class="right upside-down">
          <p>2</p>
          <p>♦</p>
        </div>
      </div>

      <!-- Three -->
      <div class="card red-card">
        <div class="left">
          <p>3</p>
          <p>♦</p>
        </div>
        <div class="middle three">
          <p>♦</p>
          <p>♦</p>
          <p>♦</p>
        </div>
        <div class="right upside-down">
          <p>3</p>
          <p>♦</p>
        </div>
      </div>

      <!-- Four -->
      <div class="card black-card">
        <div class="left">
          <p>4</p>
          <p>♣</p>
        </div>
        <div class="middle four">
          <div class="row">
            <span>♣</span>
            <span>♣</span>
          </div>
          <div class="row upside-down">
            <span>♣</span>
            <span>♣</span>
          </div>
        </div>
        <div class="right upside-down">
          <p>4</p>
          <p>♣</p>
        </div>
      </div>

      <!-- Five -->
      <div class="card red-card">
        <div class="left">
          <p>5</p>
          <p>♥</p>
        </div>
        <div class="middle five">
          <div class="row">
            <span>♥</span>
            <span>♥</span>
          </div>
          <div class="center-pip">
            <span>♥</span>
          </div>
          <div class="row upside-down">
            <span>♥</span>
            <span>♥</span>
          </div>
        </div>
        <div class="right upside-down">
          <p>5</p>
          <p>♥</p>
        </div>
      </div>
    </main>
  </body>
</html>
